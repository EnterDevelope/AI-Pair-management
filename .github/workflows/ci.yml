name: verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Check public boundary
        run: node scripts/check-public-boundary.mjs
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Test
        run: npm test -- --reporter=dot
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
